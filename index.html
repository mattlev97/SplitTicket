<!-- /index.html
Scopo: Entry point PWA. Modificato per usare import relativi da src/app.js.
Nota: non è richiesto altro cambiamento qui se non lo script src relativo.
-->
<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>SplitTicket</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#F6F0FF">
  <link rel="stylesheet" href="/css/styles.css">
  <!-- ZXing library for barcode scanning -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
</head>
<body>
  <main id="app" class="container">
    <!-- Header -->
    <header class="app-header">
      <h1>SplitTicket</h1>
      <button id="btn-settings" class="icon-btn" aria-label="Impostazioni">⚙️</button>
    </header>

    <!-- Home / Cart -->
    <section id="view-cart" class="view active" aria-labelledby="cart-title">
      <h2 id="cart-title">Carrello</h2>

      <form id="quick-add-form" class="card" aria-label="Aggiungi prodotto">
        <div class="row">
          <input id="input-name" type="text" inputmode="text" placeholder="Nome prodotto" required aria-label="Nome prodotto">
          <input id="input-price" type="number" step="0.01" placeholder="Prezzo €" inputmode="decimal" required aria-label="Prezzo prodotto">
          <input id="input-qty" type="number" min="1" value="1" placeholder="Qty" inputmode="numeric" aria-label="Quantità">
        </div>
        <div class="row">
          <input id="input-barcode" type="text" placeholder="Codice a barre (opzionale)" aria-label="Codice a barre">
          <button id="btn-scan" type="button" class="primary">Scanner</button>
        </div>
        <div class="row">
          <button id="btn-add" type="submit" class="primary large">Aggiungi al carrello</button>
        </div>
      </form>

      <section id="cart-list" class="card">
        <ul id="items" aria-live="polite"></ul>
        <div class="totals">
          <div>Totale: <strong id="total-amount">€0.00</strong></div>
          <div>
            <button id="btn-optimize" class="primary large">Calcola ottimizzazione</button>
            <button id="btn-clear" class="danger">Svuota</button>
          </div>
        </div>
      </section>
    </section>

    <!-- Scanner view -->
    <section id="view-scanner" class="view" aria-hidden="true">
      <h2>Scanner</h2>
      <div id="scanner-container" class="card">
        <video id="video" autoplay playsinline></video>
        <div id="scan-overlay" aria-hidden="true"></div>
        <div id="scan-feedback" role="status" aria-live="polite"></div>
        <div class="row">
          <button id="btn-stop-scan" class="secondary">Chiudi scanner</button>
        </div>
      </div>
    </section>

    <!-- Result view -->
    <section id="view-result" class="view" aria-hidden="true">
      <h2>Risultato ottimizzazione</h2>
      <div id="result-card" class="card"></div>
      <div class="row">
        <button id="btn-save-history" class="primary">Salva in storico</button>
        <button id="btn-back-home" class="secondary">Torna al carrello</button>
      </div>
    </section>

    <!-- History view -->
    <section id="view-history" class="view" aria-hidden="true">
      <h2>Storico</h2>
      <div id="history-list" class="card"></div>
      <div class="row">
        <button id="btn-export-csv" class="primary">Esporta CSV</button>
        <button id="btn-export-json" class="secondary">Esporta JSON</button>
        <button id="btn-clear-history" class="danger">Cancella storico</button>
      </div>
    </section>

    <!-- Settings view -->
    <section id="view-settings" class="view" aria-hidden="true">
      <h2>Impostazioni</h2>
      <div class="card">
        <label>Valore buono (tu) €<input id="voucher-user" type="number" step="0.01"></label>
        <label>Valore buono (lei) €<input id="voucher-partner" type="number" step="0.01"></label>
        <label>Numero buoni (tu) <input id="voucher-count-user" type="number" min="0"></label>
        <label>Numero buoni (lei) <input id="voucher-count-partner" type="number" min="0"></label>
        <div class="row">
          <button id="btn-save-settings" class="primary">Salva impostazioni</button>
          <button id="btn-reset-settings" class="secondary">Ripristina default</button>
        </div>
      </div>
    </section>

    <nav class="bottom-nav" role="navigation" aria-label="Navigazione principale">
      <button data-view="view-cart" class="nav-btn active">Carrello</button>
      <button data-view="view-scanner" class="nav-btn">Scanner</button>
      <button data-view="view-history" class="nav-btn">Storico</button>
      <button data-view="view-settings" class="nav-btn">Impostazioni</button>
    </nav>
  </main>

  <!-- Carica il modulo principale con path relativo per permettere corretta risoluzione degli import -->
  <script type="module" src="./src/app.js"></script>
</body>
</html>
